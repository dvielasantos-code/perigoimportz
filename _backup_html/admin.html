<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PERIGOIMPORTZ | Painel Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131313; color: #e2e2e2; font-family: 'Manrope', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-[#131313]">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-sm bg-[#1b1b1b] p-8 rounded-2xl border border-neutral-800 shadow-2xl">
            <h1 class="text-3xl font-black text-white text-center tracking-tighter uppercase mb-2">Painel de Controle</h1>
            <p class="text-neutral-500 text-center text-sm mb-8">Acesso restrito à curadoria.</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">E-mail</label>
                    <input type="email" id="email" required class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Senha</label>
                    <input type="password" id="password" required class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <button type="submit" class="w-full bg-white text-black font-black uppercase tracking-tighter py-4 rounded-full hover:bg-neutral-200 transition-colors mt-6">
                    Entrar no Sistema
                </button>
                <div id="login-error" class="text-red-500 text-sm font-bold text-center hidden mt-4">Credenciais inválidas.</div>
            </form>
        </div>
    </div>

    <!-- ADMIN DASHBOARD (Hidden by default) -->
    <div id="dashboard-screen" class="hidden min-h-screen">
        <header class="bg-[#000000] px-8 py-6 flex justify-between items-center border-b border-neutral-800">
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">PERIGOIMPORTZ <span class="text-neutral-500">ADMIN</span></h1>
            <div class="flex gap-4">
                <button id="add-product-btn" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm tracking-tighter uppercase cursor-pointer hover:opacity-80 transition">
                    + Novo Produto
                </button>
                <button id="logout-btn" class="text-neutral-500 hover:text-white transition cursor-pointer flex items-center gap-2">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </header>

        <main class="p-8 max-w-6xl mx-auto">
            <h2 class="text-2xl font-bold uppercase tracking-tighter mb-6 text-white border-b border-neutral-800 pb-4">Seu Catálogo</h2>
            
            <!-- Products Table -->
            <div class="bg-[#1b1b1b] rounded-2xl overflow-hidden shadow-2xl border border-neutral-800">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#0e0e0e] border-b border-neutral-800 text-neutral-400 text-xs uppercase tracking-widest">
                            <th class="p-4 font-bold">Imagem</th>
                            <th class="p-4 font-bold">Produto</th>
                            <th class="p-4 font-bold">Categoria</th>
                            <th class="p-4 font-bold">Preço</th>
                            <th class="p-4 font-bold">Status</th>
                            <th class="p-4 font-bold text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list" class="divide-y divide-neutral-800 text-sm">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
                <div id="loading-inventory" class="text-center py-10 text-neutral-500 font-bold uppercase tracking-widest">
                    Conectando ao Firestore...
                </div>
            </div>
        </main>
    </div>

    <!-- EDIT / ADD MODAL -->
    <div id="product-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex justify-center items-center py-10">
        <div class="bg-[#1b1b1b] w-full max-w-2xl rounded-2xl border border-neutral-800 shadow-2xl p-8 overflow-y-auto max-h-full">
            <div class="flex justify-between items-start mb-6">
                <h2 id="modal-title" class="text-2xl font-black uppercase tracking-tighter text-white">Novo Produto</h2>
                <span id="close-modal" class="material-symbols-outlined cursor-pointer text-neutral-500 hover:text-white transition">close</span>
            </div>

            <form id="product-form" class="space-y-6">
                <input type="hidden" id="product-id">
                
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Nome do Produto</label>
                        <input type="text" id="p-name" required class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white">
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Preço (R$)</label>
                        <input type="number" step="0.01" id="p-price" required class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white">
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Categoria</label>
                        <select id="p-category" required class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white">
                            <option value="camisetas">Camisetas</option>
                            <option value="calcas">Calças</option>
                            <option value="bones">Bonés</option>
                            <option value="tenis">Tênis</option>
                            <option value="jaquetas">Jaquetas</option>
                            <option value="acessorios">Acessórios</option>
                        </select>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Descrição</label>
                        <textarea id="p-desc" rows="3" required class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white"></textarea>
                    </div>

                    <!-- Cloudinary Integration -->
                    <div class="col-span-2">
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Imagem do Produto</label>
                        <div class="flex items-center gap-4">
                            <img id="p-img-preview" src="https://via.placeholder.com/150" class="w-20 h-20 object-cover rounded-lg border border-neutral-800 hidden">
                            <div class="flex flex-col gap-2 w-full">
                                <input type="file" id="p-file" accept="image/*" class="text-sm text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-[#131313] file:text-white hover:file:bg-neutral-800 cursor-pointer">
                                <p class="text-xs text-neutral-500">A imagem será enviada para o Cloudinary automaticamente ao salvar.</p>
                                <input type="hidden" id="p-image-url">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Em Destaque?</label>
                        <select id="p-featured" class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white">
                            <option value="false">Não</option>
                            <option value="true">Sim, exibir na Home</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs uppercase tracking-widest text-neutral-400 font-bold mb-2">Status</label>
                        <select id="p-status" class="w-full bg-[#131313] border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-white">
                            <option value="ativo">Ativo (Visível)</option>
                            <option value="inativo">Inativo (Oculto)</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end gap-4 mt-8 border-t border-neutral-800 pt-6">
                    <button type="button" id="cancel-btn" class="px-6 py-3 rounded-full font-bold text-white hover:bg-neutral-800 transition uppercase tracking-tighter text-sm">Cancelar</button>
                    <button type="submit" id="save-btn" class="px-8 py-3 bg-white text-black rounded-full font-black uppercase tracking-tighter hover:bg-neutral-200 transition flex items-center gap-2">
                        Salvar Produto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- CARREGA FIREBASE MODULOS -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
