<head>

            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "surface-container-high": "#2a2a2a",
                  "surface-container-low": "#1b1b1b",
                  "outline": "#919191",
                  "on-surface-variant": "#c6c6c6",
                  "on-primary-fixed": "#ffffff",
                  "primary-fixed-dim": "#454747",
                  "on-surface": "#e2e2e2",
                  "on-secondary": "#1b1c1c",
                  "surface-tint": "#c6c6c7",

                  "background": "#131313",
                  "inverse-on-surface": "#303030",

                  "surface": "#131313",
                  "on-error": "#690005",
                  "surface-variant": "#353535",
                  "on-tertiary-container": "#000000",
                  "on-secondary-fixed": "#1b1c1c",
                  "inverse-primary": "#5d5f5f",
                  "surface-container-highest": "#353535",
                  "primary-fixed": "#5d5f5f",
                  "tertiary": "#e4e2e1",

                  "primary-container": "#d4d4d4",
                  "on-tertiary-fixed": "#ffffff",
                  "secondary-container": "#474746",
                  "secondary": "#c8c6c5"

                fontFamily: {

                  "body": ["Manrope"],
                  "label": ["Inter"]

                borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

          }

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131313; color: #e2e2e2; font-family: 'Manrope', sans-serif; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-background text-on-background">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-[#000000] flex justify-between items-center px-8 py-6 max-w-full">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
            <span class="material-symbols-outlined text-white hover:opacity-80 transition-opacity duration-300 scale-95 active:scale-90 transition-transform">menu</span>
            <h1 class="text-2xl font-black tracking-tighter text-white font-['Manrope'] uppercase">PERIGOIMPORTZ</h1>
        </div>
        <div class="hidden md:flex flex-1 max-w-xl mx-12">
            <div class="relative w-full group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500">search</span>
                <input id="desktop-search" class="w-full bg-[#0e0e0e] border-none rounded-full py-3 pl-12 pr-4 text-sm focus:ring-1 focus:ring-primary/20 placeholder-neutral-500 transition-all font-['Manrope']" placeholder="Buscar no arquivo..." type="text"/>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <span class="material-symbols-outlined text-white cursor-pointer hover:opacity-80 transition-opacity duration-300 scale-95 active:scale-90 transition-transform">shopping_bag</span>
            <span class="material-symbols-outlined text-white cursor-pointer hover:opacity-80 transition-opacity duration-300 scale-95 active:scale-90 transition-transform md:hidden">search</span>
        </div>
    </header>

    <main class="pt-24 pb-12">
        <!-- Hero Banner -->
        <section class="px-8 mb-20">
            <div class="relative w-full aspect-video md:aspect-[21/7] rounded-xl overflow-hidden group">
                <img class="w-full h-full object-cover grayscale transition-transform duration-700 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR8WfMT6yGX8Qp6mJAVYg4ZjzaURdfQ-4zQd6vFb2NvbMfMnRBo7I0ns1KZWn9BM1gp0zL4yRZrecudGHQD6MmyPSkq_ZLz89njFzqG77SqTXrzWKJqNpgM2fSIOYakZes1Jfki-FpOEBZXCfcyhHm1AowjgI7Polcfjg1w-YDkXUMAGeu9WCJND6amT-tEGaLzglsjQ8NITY8zjItt-DvEiUJioZeOSfH37_TTJ80Z37s9Cng8j4kfiTUvX-SJDCPFNaDXIvmafg9"/>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-12">
                    <span class="font-['Inter'] text-xs tracking-[0.2em] uppercase text-white/60 mb-4">Drop 01 // Arquivo 2024</span>
                    <h2 class="text-6xl md:text-8xl font-black tracking-tighter text-white mb-6 uppercase leading-[0.9]">ESSENCIAIS<br/>OBSCUROS</h2>
                    <button class="bg-primary text-on-primary px-10 py-4 rounded-full font-bold text-sm tracking-widest uppercase hover:opacity-90 transition-all w-fit" onclick="window.location.href='category.html'">Explorar Coleção</button>
                </div>
            </div>
        </section>

        <!-- Dynamic Categories Carousel -->
        <section class="px-8 mb-32">
            <h3 class="text-xs font-label uppercase tracking-[0.2em] text-outline mb-6">Categorias Principais</h3>
            <div id="categories-grid" class="flex overflow-x-auto gap-6 pb-4 no-scrollbar snap-x">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Featured Products -->
        <section class="px-8 mb-32">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h3 class="text-4xl font-black tracking-tighter uppercase mb-2">Destaques</h3>
                    <p class="text-neutral-500 font-body">Peças selecionadas pela nossa curadoria.</p>
                </div>
                <a class="text-sm font-bold underline underline-offset-8 tracking-tighter hover:text-white transition-colors" href="category.html">VER TUDO</a>
            </div>
            <div id="featured-products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-[#0e0e0e] w-full rounded-t-[3rem] mt-20 flex flex-col md:flex-row justify-between items-center px-12 py-16">
        <div class="flex flex-col gap-4 mb-8 md:mb-0">
            <span class="font-bold text-lg text-white uppercase tracking-tighter">PERIGOIMPORTZ</span>
            <p id="footer-address" class="font-['Manrope'] text-sm leading-[1.6] tracking-tight text-neutral-400">
                PERIGOIMPORTZ © 2024.
            </p>
        </div>
        <div class="flex gap-12 items-center">
            <a id="whatsapp-footer" class="font-['Manrope'] text-sm leading-[1.6] tracking-tight text-white underline hover:opacity-80 transition-opacity duration-300 flex items-center gap-2" href="#">
                <span class="material-symbols-outlined text-base">chat</span>
                WhatsApp
            </a>
            <div class="flex gap-6">
                <span class="material-symbols-outlined text-neutral-400 hover:text-white transition-colors cursor-pointer">brand_awareness</span>
                <span class="material-symbols-outlined text-neutral-400 hover:text-white transition-colors cursor-pointer">contact_support</span>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/shared.js"></script>
    <script>
        // Carrega categorias dinâmicas
        const categoriesGrid = document.getElementById('categories-grid');
        data.categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = "min-w-[300px] snap-center shrink-0 group relative aspect-video rounded-xl overflow-hidden bg-surface-container-low flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container transition-colors duration-500";
            div.onclick = () => window.location.href = `category.html?category=${cat.id}`;
            div.innerHTML = `
                <span class="material-symbols-outlined text-4xl mb-4 group-hover:scale-110 transition-transform duration-500">${cat.icon}</span>
                <span class="font-headline font-bold text-lg tracking-tight">${cat.name}</span>
            `;
            categoriesGrid.appendChild(div);
        });

        // Carrega produtos destaques
        const featuredProductsGrid = document.getElementById('featured-products-grid');
        const featured = data.products.filter(p => p.featured && p.status === 'ativo');
        featured.forEach(p => {
            featuredProductsGrid.innerHTML += shared.renderProductCard(p);
        });

        // Configura Footer
        document.getElementById('footer-address').innerText = `PERIGOIMPORTZ © 2024. ${data.address}`;
        document.getElementById('whatsapp-footer').href = shared.getWhatsAppLink();

        // Inicia Busca
        shared.initSearch('#desktop-search');
    </script>
</body>
</html>
