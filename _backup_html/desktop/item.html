<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PERIGOIMPORTZ | Produto</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "surface-container-high": "#2a2a2a",
                  "surface-container-low": "#1b1b1b",
                  "outline": "#919191",
                  "on-surface-variant": "#c6c6c6",
                  "on-primary-fixed": "#ffffff",
                  "primary-fixed-dim": "#454747",
                  "on-surface": "#e2e2e2",
                  "on-secondary": "#1b1c1c",
                  "surface-tint": "#c6c6c7",
                  "error": "#ffb4ab",
                  "background": "#131313",
                  "inverse-on-surface": "#303030",
                  "on-background": "#e2e2e2",
                  "surface-dim": "#131313",
                  "primary": "#ffffff",
                  "tertiary-container": "#919090",
                  "on-secondary-container": "#e5e2e1",
                  "error-container": "#93000a",
                  "on-error-container": "#ffdad6",
                  "secondary-fixed-dim": "#adabaa",
                  "outline-variant": "#474747",
                  "on-primary": "#1a1c1c",
                  "on-tertiary-fixed-variant": "#e4e2e1",
                  "tertiary-fixed-dim": "#474747",
                  "secondary-fixed": "#c8c6c5",
                  "on-secondary-fixed-variant": "#3c3b3b",
                  "on-tertiary": "#1b1c1c",
                  "surface-container-lowest": "#0e0e0e",
                  "tertiary-fixed": "#5f5e5e",
                  "surface-container": "#1f1f1f",
                  "surface-bright": "#393939",
                  "inverse-surface": "#e2e2e2",
                  "on-primary-container": "#000000",
                  "surface": "#131313",
                  "on-error": "#690005",
                  "surface-variant": "#353535",
                  "on-tertiary-container": "#000000",
                  "on-secondary-fixed": "#1b1c1c",
                  "inverse-primary": "#5d5f5f",
                  "surface-container-highest": "#353535",
                  "primary-fixed": "#5d5f5f",
                  "tertiary": "#e4e2e1",
                  "on-primary-fixed-variant": "#e2e2e2",
                  "primary-container": "#d4d4d4",
                  "on-tertiary-fixed": "#ffffff",
                  "secondary-container": "#474746",
                  "secondary": "#c8c6c5"
                },
                fontFamily: {
                  "headline": ["Manrope"],
                  "body": ["Manrope"],
                  "label": ["Inter"]
                },
                borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131313; color: #e2e2e2; }
    </style>
</head>
<body class="font-body selection:bg-primary selection:text-on-primary">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-[#000000] text-white">
        <nav class="flex justify-between items-center px-8 py-6 max-w-full">
            <div class="flex items-center gap-4 cursor-pointer" onclick="window.history.back()">
                <span class="material-symbols-outlined text-white hover:opacity-80 transition-opacity">arrow_back</span>
            </div>
            <div class="text-2xl font-black tracking-tighter uppercase font-['Manrope'] cursor-pointer" onclick="window.location.href='index.html'">
                PERIGOIMPORTZ
            </div>
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-white cursor-pointer hover:opacity-80 transition-opacity">search</span>
            </div>
        </nav>
    </header>

    <main class="pt-32 pb-20 px-6 md:px-12 lg:px-24 max-w-screen-2xl mx-auto">
        <div id="product-content" class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-24 items-start">
            <div class="lg:col-span-7">
                <div class="aspect-[4/5] bg-surface-container-low rounded-xl overflow-hidden group">
                    <img id="product-img" alt="Produto" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-[1.02]" src=""/>
                </div>
            </div>
            <div class="lg:col-span-5 flex flex-col gap-10 lg:sticky lg:top-32">
                <div class="space-y-4">
                    <span id="product-cat-name" class="font-label text-sm uppercase tracking-widest text-outline"></span>
                    <h1 id="product-title" class="text-5xl lg:text-6xl font-headline font-extrabold tracking-[-0.04em] text-primary leading-tight">
                        <!-- Nome via JS -->
                    </h1>
                    <div class="flex justify-between items-baseline pt-4">
                        <span id="product-price" class="font-label text-2xl font-semibold text-primary"></span>
                        <span id="product-sku" class="font-label text-sm text-outline"></span>
                    </div>
                </div>
                <div class="h-px bg-outline-variant opacity-15"></div>
                <div class="space-y-6">
                    <p id="product-desc" class="text-on-surface leading-[1.6] text-lg">
                        <!-- Desc via JS -->
                    </p>
                    <ul class="space-y-2 text-on-surface-variant font-label text-sm">
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-xs">check_circle</span> 100% Algodão Premium</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-xs">check_circle</span> Produção Limitada</li>
                        <li class="flex items-center gap-2"><span class="material-symbols-outlined text-xs">check_circle</span> Selecionado pela curadoria</li>
                    </ul>
                </div>
                <div class="pt-6">
                    <a id="whatsapp-btn" class="w-full bg-primary text-on-primary py-6 rounded-full font-headline font-bold text-lg flex items-center justify-center gap-3 transition-all duration-500 hover:opacity-90 active:scale-[0.98] bg-gradient-to-r from-primary to-primary-container" href="#">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
                        WhatsApp
                    </a>
                    <p class="text-center font-label text-xs text-outline mt-4">Fale com um curador para finalizar seu pedido.</p>
                </div>
            </div>
        </div>
        <div id="product-not-found" class="hidden text-center py-40">
            <h2 class="text-4xl font-black mb-4">Produto não encontrado</h2>
            <button onclick="window.history.back()" class="text-primary underline">Voltar</button>
        </div>
    </main>

    <footer class="w-full rounded-t-[3rem] mt-20 bg-[#0e0e0e] text-white">
        <div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 w-full gap-8">
            <div class="flex flex-col gap-2 text-center md:text-left">
                <span class="font-bold text-lg uppercase font-headline tracking-tighter">PERIGOIMPORTZ</span>
                <p id="footer-address" class="text-sm text-neutral-400"></p>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/shared.js"></script>
    <script>
        const productId = parseInt(shared.getParam('id'));
        const p = data.products.find(item => item.id === productId);

        if (!p) {
            document.getElementById('product-content').classList.add('hidden');
            document.getElementById('product-not-found').classList.remove('hidden');
        } else {
            const cat = data.categories.find(c => c.id === p.category);
            document.getElementById('product-title').innerText = p.name;
            document.getElementById('product-img').src = p.image;
            document.getElementById('product-price').innerText = shared.formatPrice(p.price);
            document.getElementById('product-desc').innerText = p.description;
            document.getElementById('product-cat-name').innerText = cat ? cat.name : "Geral";
            document.getElementById('product-sku').innerText = `SKU: PI-2024-00${p.id}`;
            document.getElementById('whatsapp-btn').href = shared.getWhatsAppLink(p.name);
        }

        document.getElementById('footer-address').innerText = `PERIGOIMPORTZ © 2024. ${data.address}`;
    </script>
</body>
</html>
