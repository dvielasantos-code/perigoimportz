<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PERIGOIMPORTZ | Produto Mobile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#2a2a2a",
                        "surface-container-low": "#1b1b1b",
                        "outline": "#919191",
                        "on-surface-variant": "#c6c6c6",
                        "on-primary-fixed": "#ffffff",
                        "primary-fixed-dim": "#454747",
                        "on-surface": "#e2e2e2",
                        "on-secondary": "#1b1c1c",
                        "surface-tint": "#c6c6c7",
                        "error": "#ffb4ab",
                        "background": "#131313",
                        "inverse-on-surface": "#303030",
                        "on-background": "#e2e2e2",
                        "surface-dim": "#131313",
                        "primary": "#ffffff",
                        "tertiary-container": "#919090",
                        "on-secondary-container": "#e5e2e1",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#adabaa",
                        "outline-variant": "#474747",
                        "on-primary": "#1a1c1c",
                        "on-tertiary-fixed-variant": "#e4e2e1",
                        "tertiary-fixed-dim": "#474747",
                        "secondary-fixed": "#c8c6c5",
                        "on-secondary-fixed-variant": "#3c3b3b",
                        "on-tertiary": "#1b1c1c",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-fixed": "#5f5e5e",
                        "surface-container": "#1f1f1f",
                        "surface-bright": "#393939",
                        "inverse-surface": "#e2e2e2",
                        "on-primary-container": "#000000",
                        "surface": "#131313",
                        "on-error": "#690005",
                        "surface-variant": "#353535",
                        "on-tertiary-container": "#000000",
                        "on-secondary-fixed": "#1b1c1c",
                        "inverse-primary": "#5d5f5f",
                        "surface-container-highest": "#353535",
                        "primary-fixed": "#5d5f5f",
                        "tertiary": "#e4e2e1",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "primary-container": "#d4d4d4",
                        "on-tertiary-fixed": "#ffffff",
                        "secondary-container": "#474746",
                        "secondary": "#c8c6c5"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131313; min-height: 100vh; }
    </style>
</head>
<body class="font-body text-on-surface selection:bg-primary selection:text-on-primary">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-[#000000] flex justify-between items-center px-8 py-6 max-w-full">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.history.back()">
            <span class="material-symbols-outlined text-white">arrow_back</span>
        </div>
        <h1 class="text-2xl font-black tracking-tighter text-white font-['Manrope'] uppercase cursor-pointer" onclick="window.location.href='index.html'">PERIGOIMPORTZ</h1>
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-white">search</span>
        </div>
    </header>

    <main id="product-content" class="pt-28 pb-10 px-6 max-w-md mx-auto">
        <section class="mb-10">
            <div class="aspect-[3/4] w-full overflow-hidden rounded-xl bg-surface-container-low shadow-2xl">
                <img id="product-img" alt="Produto" class="w-full h-full object-cover transition-transform duration-500 hover:scale-[1.02]" src=""/>
            </div>
        </section>
        <section class="space-y-8">
            <div class="flex flex-col gap-2">
                <span id="product-cat-name" class="font-label text-xs uppercase tracking-[0.2em] text-outline"></span>
                <h2 id="product-title" class="text-4xl font-headline font-extrabold tracking-[-0.04em] leading-none text-primary"></h2>
                <div class="flex justify-between items-baseline mt-4">
                    <span id="product-price" class="font-label text-2xl font-semibold tracking-tighter text-primary"></span>
                    <span class="font-label text-sm text-outline">Disponível em Estoque</span>
                </div>
            </div>
            <div class="p-6 rounded-lg bg-surface-container-low">
                <p id="product-desc" class="text-on-surface-variant leading-relaxed text-md">
                    <!-- Desc via JS -->
                </p>
            </div>
            <div class="pt-6">
                <a id="whatsapp-btn" class="flex items-center justify-center gap-3 w-full py-6 bg-primary text-on-primary rounded-full font-headline font-bold text-lg hover:opacity-90 active:scale-95 transition-all shadow-[0_20px_40px_-10px_rgba(255,255,255,0.1)]" href="#">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
                    CONSULTAR WHATSAPP
                </a>
                <p class="text-center mt-4 font-label text-[10px] text-outline uppercase tracking-widest">Atendimento direto com o curador</p>
            </div>
        </section>
    </main>

    <div id="product-not-found" class="hidden text-center py-40">
        <h2 class="text-4xl font-black mb-4">Produto não encontrado</h2>
        <button onclick="window.history.back()" class="text-primary underline">Voltar</button>
    </div>

    <footer class="w-full rounded-t-[3rem] mt-20 bg-[#0e0e0e] flex flex-col items-center px-12 py-16">
        <div class="text-center space-y-6">
            <span class="font-bold text-lg text-white font-headline">PERIGOIMPORTZ</span>
            <p id="footer-address" class="text-neutral-400 text-[10px] uppercase tracking-tight"></p>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/shared.js"></script>
    <script>
        const productId = parseInt(shared.getParam('id'));
        const p = data.products.find(item => item.id === productId);

        if (!p) {
            document.getElementById('product-content').classList.add('hidden');
            document.getElementById('product-not-found').classList.remove('hidden');
        } else {
            const cat = data.categories.find(c => c.id === p.category);
            document.getElementById('product-title').innerText = p.name;
            document.getElementById('product-img').src = p.image;
            document.getElementById('product-price').innerText = shared.formatPrice(p.price);
            document.getElementById('product-desc').innerText = p.description;
            document.getElementById('product-cat-name').innerText = `Categoria // ${cat ? cat.name : "Geral"}`;
            document.getElementById('whatsapp-btn').href = shared.getWhatsAppLink(p.name);
        }

        document.getElementById('footer-address').innerText = `PERIGOIMPORTZ © 2024. ${data.address}`;
    </script>
</body>
</html>
